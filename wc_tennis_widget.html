<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RotoGrinders · Tennis Matchups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e14; --bg2:#101620; --bg3:#161e2c; --bg4:#1d2738;
  --bd:#212c3d; --bd2:#2c3a50;
  --txt:#f2f4f8; --sub:#8b97ab; --dim:#4d5a70;
  --wh:#ffffff;

  --court:#1d6e5c;
  --court-dim:#0d2f27;
  --clay:#c1602f;
  --clay-dim:#2e1a0e;
  --ball:#ddef3a;
  --ball-dim:#2a2e0c;

  --g:#22c55e; --gbg:#0a2218; --gbd:#166534;
  --a:#f5a623; --abg:#2a1a00; --abd:#92600e;
  --r:#ef4444; --rbg:#220a0a; --rbd:#991b1b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased}
.mono{font-family:'Space Mono',monospace;font-variant-numeric:tabular-nums}

.brand-bar{background:linear-gradient(135deg,var(--court) 0%,var(--court-dim) 100%);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--ball)}
.brand-name{font-size:15px;font-weight:900;letter-spacing:.3px;color:var(--wh);display:flex;align-items:center;gap:7px}
.brand-name .dot{width:8px;height:8px;border-radius:50%;background:var(--ball);display:inline-block}
.brand-sub{font-size:9px;color:rgba(255,255,255,.65);letter-spacing:1.5px;text-transform:uppercase;font-weight:700}

.view-toggle{background:var(--bg2);border-bottom:1px solid var(--bd);padding:9px 16px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.vbtn{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:6px 14px;background:var(--bg3);color:var(--sub);border:1px solid var(--bd2);cursor:pointer;border-radius:3px;transition:.15s}
.vbtn.on{background:var(--court);color:var(--wh);border-color:var(--court)}
.vbtn:hover:not(.on){background:var(--bg4);color:var(--txt)}

.match-select{margin-left:auto;display:flex;align-items:center;gap:8px}
.match-select select{background:var(--bg3);color:var(--txt);border:1px solid var(--bd2);border-radius:3px;padding:7px 10px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;min-width:240px}
.match-select select:focus{outline:1px solid var(--court)}

.tour-filter{background:var(--bg2);border-bottom:1px solid var(--bd);padding:7px 16px;display:flex;gap:4px}
.tbtn{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:4px 12px;background:var(--bg3);color:var(--sub);border:1px solid var(--bd2);cursor:pointer;border-radius:2px;transition:.15s}
.tbtn.on{background:var(--clay);color:var(--wh);border-color:var(--clay)}

.landing-wrap{padding:14px 16px}
.landing-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.landing-title{font-size:16px;font-weight:900;color:var(--wh);letter-spacing:-.2px}
.landing-count{font-size:11px;color:var(--sub)}
.bb-list{display:flex;flex-direction:column;gap:7px}
.bb-row{background:var(--bg2);border:1px solid var(--bd);border-radius:5px;padding:11px 14px;display:grid;grid-template-columns:auto 1fr auto auto auto;gap:12px;align-items:center;cursor:pointer;transition:.15s}
.bb-row:hover{background:var(--bg3);border-color:var(--bd2)}
.bb-rank{font-size:16px;font-weight:900;color:var(--ball);min-width:22px;text-align:center}
.bb-info{display:flex;flex-direction:column;gap:2px}
.bb-info-side{font-size:14px;font-weight:800;color:var(--wh)}
.bb-info-match{font-size:10px;color:var(--sub)}
.bb-mkt-tag{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:3px 8px;border-radius:10px;white-space:nowrap}
.bb-mkt-tag.ML{background:var(--court-dim);color:#5fd9b8;border:1px solid var(--court)}
.bb-mkt-tag.SP{background:var(--clay-dim);color:#f0935f;border:1px solid var(--clay)}
.bb-mkt-tag.TO{background:#1a1a3a;color:#9fa8ff;border:1px solid #4a4ab0}
.bb-odds-val{font-size:14px;font-weight:700;color:var(--sub)}
.bb-edge-val{font-size:12px;font-weight:800;color:var(--g);background:var(--gbg);border:1px solid var(--gbd);padding:4px 9px;border-radius:3px;white-space:nowrap}
.landing-empty{text-align:center;color:var(--dim);padding:40px 0;font-size:12px}

.game-hdr{background:var(--bg2);border-bottom:2px solid var(--bd);padding:16px;display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center}
.gh-player{display:flex;flex-direction:column;gap:4px}
.gh-player.r{text-align:right;align-items:flex-end}
.gh-rank{font-size:10px;color:var(--dim);font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.gh-name{font-size:21px;font-weight:900;color:var(--wh);line-height:1.05;letter-spacing:-.3px}
.gh-lowsample{display:inline-block;font-size:8px;font-weight:800;background:var(--abg);color:var(--a);border:1px solid var(--abd);padding:1px 5px;border-radius:2px;letter-spacing:.4px;margin-top:2px}
.gh-ml{font-size:21px;font-weight:800;color:var(--wh)}
.gh-ml.fav{color:var(--ball)}
.gh-prob{font-size:11px;color:var(--sub)}
.gh-mid{display:flex;flex-direction:column;align-items:center;gap:5px}
.gh-ou-box{background:var(--bg4);border:1px solid var(--court);padding:6px 18px;border-radius:4px;font-size:19px;font-weight:900;color:var(--wh);text-align:center}
.gh-ou-lbl{font-size:8px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;text-align:center;margin-top:2px}
.gh-surf{font-size:10px;color:var(--sub);text-align:center;margin-top:2px}

.tab-bar{background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;padding:0 16px}
.tab{padding:10px 16px;font-size:12px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--sub);cursor:pointer;border-bottom:3px solid transparent;transition:.15s;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--txt)}
.tab.on{color:var(--ball);border-bottom-color:var(--ball)}
.pane{display:none}.pane.on{display:block}

.bb-match-wrap{padding:14px 16px;border-bottom:1px solid var(--bd)}
.bb-match-hdr{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.bbm-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--bg3)}
.bbm-row:last-child{border-bottom:none}
.bbm-rank{font-size:13px;font-weight:900;color:var(--ball);min-width:18px}
.bbm-side{font-size:13.5px;font-weight:700;color:var(--wh)}
.bbm-vs{font-size:10px;color:var(--dim);margin-left:6px}
.bbm-odds{font-size:13px;font-weight:700;color:var(--sub)}
.bbm-edge{font-size:11px;font-weight:800;color:var(--g);background:var(--gbg);border:1px solid var(--gbd);padding:3px 8px;border-radius:3px}
.bbm-empty{color:var(--dim);font-style:italic;font-size:11px;padding:10px 0}

.pt-hdr{padding:8px 16px;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--sub);background:var(--bg2);border-bottom:1px solid var(--bd);border-top:1px solid var(--bd)}
.pt{width:100%;border-collapse:collapse}
.pt th{font-size:9px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--dim);padding:8px 5px;text-align:right;border-bottom:1px solid var(--bd2);background:var(--bg2);white-space:nowrap}
.pt th:first-child{text-align:left;padding-left:16px;min-width:140px}
.pt td{padding:0;border-bottom:1px solid var(--bg3);white-space:nowrap}
.pt td:first-child{padding:7px 8px 7px 16px;font-size:13px;font-weight:600;color:var(--wh);text-align:left}
.pt tr:hover td{filter:brightness(1.12)}
.pt tr:hover td:first-child{background:var(--bg3)}
.sc{display:block;padding:7px 5px;text-align:right;font-size:12px;font-weight:700}
.hi{background:var(--gbg);color:#4ade80}
.md{background:var(--bg3);color:#c8cfdb}
.lo{background:var(--rbg);color:#f87171}
.nu{background:var(--bg);color:var(--dim);text-align:center}
.rank-badge{font-size:9px;color:var(--dim);font-weight:600;margin-left:5px}

.mc-wrap{padding:16px}
.mc-hdr{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.mc-table{width:100%;border-collapse:collapse}
.mc-table th{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);padding:6px 4px;text-align:center}
.mc-table th.lbl{text-align:left;padding-left:4px}
.mc-row{border-top:1px solid var(--bg3)}
.mc-row td{padding:9px 4px;vertical-align:middle}
.mc-label{font-size:11px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding-left:4px!important}
.mc-val{text-align:center;font-size:14px;font-weight:800;padding:5px 10px;border-radius:3px;min-width:64px;display:inline-block}
.mc-cell{text-align:center}
.mc-samplewarn{font-size:8px;color:var(--a);font-weight:700;text-transform:uppercase;letter-spacing:.3px;display:block;margin-top:2px}

.disc{padding:9px 16px;font-size:9px;color:var(--dim);border-top:1px solid var(--bd);letter-spacing:.3px;line-height:1.7}

#loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px}
#loading-overlay.hidden{display:none}
.ld-spinner{width:32px;height:32px;border:2px solid var(--bd2);border-top-color:var(--ball);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-text{font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
.ld-err{font-size:10px;color:var(--r);letter-spacing:1px;text-align:center;max-width:300px;line-height:1.6}

@media(max-width:600px){
  .bb-row{grid-template-columns:auto 1fr;grid-template-areas:"rank info" ". mkt" ". odds";row-gap:4px}
  .gh-name{font-size:16px}
  .gh-ml{font-size:16px}
  .match-select{margin-left:0;width:100%}
  .match-select select{width:100%}
  .mc-table{font-size:11px}
}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="ld-spinner"></div>
  <div class="ld-text" id="ld-msg">Loading slate data...</div>
  <div class="ld-err" id="ld-err" style="display:none"></div>
</div>

<div class="brand-bar">
  <div class="brand-name"><span class="dot"></span>RotoGrinders Tennis</div>
  <div class="brand-sub">Daily Matchups</div>
</div>

<div class="view-toggle" id="viewToggle">
  <button class="vbtn on" data-view="landing" onclick="setView('landing',this)">Best Bets</button>
  <button class="vbtn" data-view="match" onclick="setView('match',this)">Match View</button>
  <div class="match-select" id="matchSelectWrap" style="display:none">
    <select id="matchSelect" onchange="selGame(this.value)"></select>
  </div>
</div>
<div class="tour-filter" id="tourFilter">
  <button class="tbtn on" data-tour="ALL" onclick="setTour('ALL',this)">All</button>
  <button class="tbtn" data-tour="ATP" onclick="setTour('ATP',this)">ATP</button>
  <button class="tbtn" data-tour="WTA" onclick="setTour('WTA',this)">WTA</button>
</div>

<div class="pane on" id="pane-landing"></div>

<div class="pane" id="pane-match">
  <div class="game-hdr" id="gameHdr"></div>
  <div class="tab-bar">
    <button class="tab on" onclick="swTab(this,'ov')">Matchup &amp; Bets</button>
    <button class="tab" onclick="swTab(this,'mc')">Matchup Chart</button>
  </div>
  <div class="pane on" id="pane-ov"></div>
  <div class="pane" id="pane-mc"></div>
</div>

<div class="disc">PROJECTIONS &amp; ODDS DATA SUBJECT TO CHANGE AND NOT UPDATED LIVE. WIN PROBABILITIES BLEND ROTOGRINDERS' ELO MODEL, POINT-LEVEL SIMULATION, AND DEVIGGED MARKET CONSENSUS. BEST BETS REFLECT MODEL EDGE VS. MARKET, NOT GUARANTEED OUTCOMES.</div>

<script>
const CSV_URL = 'https://raw.githubusercontent.com/chrisgimino/tennismodel/refs/heads/main/slate_widget.csv';

function parseCSV(text){
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(function(h){return h.trim().replace(/^"|"$/g,'');});
  return lines.slice(1).map(function(line){
    const cols=[]; let cur=''; let inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur);cur='';}
      else{cur+=c;}
    }
    cols.push(cur);
    const row={};
    headers.forEach(function(h,i){row[h]=(cols[i]||'').replace(/^"|"$/g,'').trim();});
    return row;
  });
}

function num(v){const n=parseFloat(v);return isNaN(n)?null:n;}
function fmtOdds(v){const n=num(v);if(n===null)return String.fromCharCode(8212);return n>0?'+'+Math.round(n):''+Math.round(n);}
function pct(v){const n=num(v);return n===null?String.fromCharCode(8212):Math.round(n*100)+'%';}
function fmt1(v){const n=num(v);return n===null?String.fromCharCode(8212):n.toFixed(1);}
function isTrue(v){return v==='True'||v==='true'||v===true;}
function lastName(n){return (n||'').split(' ').pop();}

function relCls(a,b,higherIsBetter){
  if(higherIsBetter===undefined) higherIsBetter=true;
  if(a===null||b===null)return 'nu';
  if(a===b)return 'md';
  const aWins = higherIsBetter ? a>b : a<b;
  return aWins?'hi':'lo';
}

const MKT_ABBR={'Moneyline':'ML','Games Spread':'SP','Total Games':'TO'};

let DATA={matches:[],bets:[]};
let AG=null, AT='ov', TOURFILTER='ALL', VIEW='landing';

async function boot(){
  try{
    const res=await fetch(CSV_URL+'?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status+' check CSV URL');
    const text=await res.text();
    const rows=parseCSV(text);
    DATA.matches=rows.filter(function(r){return r.record_type==='MATCH';});
    DATA.bets=rows.filter(function(r){return r.record_type==='BESTBET';});
    if(!DATA.matches.length) throw new Error('No MATCH rows found in CSV');
    document.getElementById('loading-overlay').classList.add('hidden');
    init();
  }catch(e){
    document.querySelector('.ld-spinner').style.display='none';
    document.getElementById('ld-msg').style.display='none';
    document.getElementById('ld-err').style.display='block';
    document.getElementById('ld-err').textContent='Failed to load: '+e.message;
  }
}
boot();

function visibleMatches(){
  return TOURFILTER==='ALL' ? DATA.matches : DATA.matches.filter(function(m){return m.tour===TOURFILTER;});
}
function visibleBets(){
  const vmIds = {};
  visibleMatches().forEach(function(m){ vmIds[m.event_id]=true; });
  return DATA.bets.filter(function(b){ return vmIds[b.event_id] && isTrue(b.meets_threshold); });
}

function init(){
  populateMatchSelect();
  renderLanding();
}

function setTour(t,btn){
  TOURFILTER=t;
  document.querySelectorAll('.tbtn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  populateMatchSelect();
  if(VIEW==='landing') renderLanding();
  else { const vm=visibleMatches(); if(vm.length) selGame(vm[0].event_id); }
}

function setView(v,btn){
  VIEW=v;
  document.querySelectorAll('.vbtn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById('matchSelectWrap').style.display = v==='match' ? 'flex' : 'none';
  document.getElementById('pane-landing').classList.toggle('on', v==='landing');
  document.getElementById('pane-match').classList.toggle('on', v==='match');
  if(v==='landing'){ renderLanding(); }
  else {
    const vm=visibleMatches();
    if(vm.length && !AG) selGame(vm[0].event_id);
    else if(AG) { renderHdr(); render(); }
  }
}

function populateMatchSelect(){
  const sel=document.getElementById('matchSelect');
  const vm=visibleMatches();
  sel.innerHTML='';
  vm.forEach(function(m){
    const opt=document.createElement('option');
    opt.value=m.event_id;
    opt.textContent=lastName(m.fav_name)+' vs '+lastName(m.dog_name)+' ('+m.surface+', '+m.tour+')';
    sel.appendChild(opt);
  });
  if(AG){
    const found = vm.filter(function(m){return m.event_id===AG;});
    if(found.length) sel.value=AG;
  }
}

function renderLanding(){
  const bets = visibleBets().slice().sort(function(a,b){return (num(b.edge)||0)-(num(a.edge)||0);});
  const wrap=document.getElementById('pane-landing');

  if(!bets.length){
    wrap.innerHTML='<div class="landing-wrap"><div class="landing-empty">No qualifying best bets on this slate right now.</div></div>';
    return;
  }

  let h='<div class="landing-wrap"><div class="landing-hdr"><div class="landing-title">Best Bets Today</div><div class="landing-count">'+bets.length+' qualifying edges</div></div><div class="bb-list">';

  bets.forEach(function(b,i){
    const matches = DATA.matches.filter(function(x){return x.event_id===b.event_id;});
    const m = matches.length ? matches[0] : null;
    const matchLabel = m ? (lastName(m.fav_name)+' vs '+lastName(m.dog_name)) : '';
    const mktAbbr = MKT_ABBR[b.market]||b.market;
    const edgeVal = num(b.edge)||0;
    const edgeStr = b.market==='Moneyline' ? (edgeVal*100).toFixed(1)+'pp' : edgeVal.toFixed(1)+' gm';
    h+='<div class="bb-row" data-eid="'+b.event_id+'">'+
      '<div class="bb-rank">'+(i+1)+'</div>'+
      '<div class="bb-info"><span class="bb-info-side">'+b.pick_side+'</span><span class="bb-info-match">'+matchLabel+(m?' '+String.fromCharCode(183)+' '+m.surface:'')+'</span></div>'+
      '<span class="bb-mkt-tag '+mktAbbr+'">'+b.market+'</span>'+
      '<span class="bb-odds-val mono">'+fmtOdds(b.pick_odds)+'</span>'+
      '<span class="bb-edge-val">+'+edgeStr+'</span>'+
    '</div>';
  });

  h+='</div></div>';
  wrap.innerHTML=h;
  wrap.querySelectorAll('.bb-row').forEach(function(row){
    row.addEventListener('click', function(){ jumpToMatch(row.getAttribute('data-eid')); });
  });
}

function jumpToMatch(eid){
  document.querySelector('[data-view="match"]').click();
  selGame(eid);
}

function selGame(id){
  AG=id;
  document.getElementById('matchSelect').value=id;
  renderHdr();
  render();
}

function swTab(btn,t){
  AT=t;
  document.querySelectorAll('#pane-match .tab').forEach(function(b){b.classList.remove('on');});
  document.querySelectorAll('#pane-match .pane').forEach(function(p){p.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById('pane-'+t).classList.add('on');
  render();
}

function render(){
  if(AT==='ov') renderOV();
  if(AT==='mc') renderMC();
}

function renderHdr(){
  const matches = DATA.matches.filter(function(x){return x.event_id===AG;});
  if(!matches.length) return;
  const m = matches[0];
  const favWp=Math.round(num(m.fav_final_win_pct)*100);
  const dogWp=100-favWp;
  document.getElementById('gameHdr').innerHTML=
    '<div class="gh-player">'+
      '<div class="gh-rank">'+(m.fav_elo_rank&&num(m.fav_elo_rank)!==null?('Elo #'+Math.round(num(m.fav_elo_rank))):'Favorite')+'</div>'+
      '<div class="gh-name">'+m.fav_name.toUpperCase()+'</div>'+
      (isTrue(m.fav_low_sample)?'<span class="gh-lowsample">LOW SAMPLE</span>':'')+
      '<div class="gh-ml fav mono">'+fmtOdds(m.fav_ml_odds)+'</div>'+
      '<div class="gh-prob">'+favWp+'% win '+String.fromCharCode(183)+' '+(m.fav_ml_book||'')+'</div>'+
    '</div>'+
    '<div class="gh-mid">'+
      '<div class="gh-ou-box mono">'+(m.market_total_line||String.fromCharCode(8212))+'</div>'+
      '<div class="gh-ou-lbl">Total Games</div>'+
      '<div class="gh-surf">'+m.surface+' '+String.fromCharCode(183)+' BO'+parseInt(m.best_of)+'</div>'+
    '</div>'+
    '<div class="gh-player r">'+
      '<div class="gh-rank">'+(m.dog_elo_rank&&num(m.dog_elo_rank)!==null?('Elo #'+Math.round(num(m.dog_elo_rank))):'Underdog')+'</div>'+
      '<div class="gh-name">'+m.dog_name.toUpperCase()+'</div>'+
      (isTrue(m.dog_low_sample)?'<span class="gh-lowsample">LOW SAMPLE</span>':'')+
      '<div class="gh-ml mono">'+fmtOdds(m.dog_ml_odds)+'</div>'+
      '<div class="gh-prob">'+dogWp+'% win '+String.fromCharCode(183)+' '+(m.dog_ml_book||'')+'</div>'+
    '</div>';
}

function bbmRow(rank, bet){
  const mktAbbr = MKT_ABBR[bet.market]||bet.market;
  const edgeVal = num(bet.edge)||0;
  const edgeStr = bet.market==='Moneyline' ? (edgeVal*100).toFixed(1)+'pp' : edgeVal.toFixed(1)+' gm';
  let vsInfo = '';
  if(bet.market==='Moneyline'){
    vsInfo = lastName(bet.fav_name)+' '+fmtOdds(bet.fav_odds)+' / '+lastName(bet.dog_name)+' '+fmtOdds(bet.dog_odds);
  } else if(bet.market==='Games Spread'){
    vsInfo = lastName(bet.fav_name)+' -'+bet.line+' ('+fmtOdds(bet.fav_odds)+') / '+lastName(bet.dog_name)+' +'+bet.line+' ('+fmtOdds(bet.dog_odds)+')';
  } else {
    vsInfo = 'O '+bet.line+' ('+fmtOdds(bet.fav_odds)+') / U '+bet.line+' ('+fmtOdds(bet.dog_odds)+')';
  }
  return '<div class="bbm-row">'+
    '<div class="bbm-rank">'+rank+'</div>'+
    '<div><span class="bb-mkt-tag '+mktAbbr+'" style="margin-right:8px">'+bet.market+'</span><span class="bbm-side">'+bet.pick_side+'</span><div class="bbm-vs">'+vsInfo+'</div></div>'+
    '<span class="bbm-odds mono">'+fmtOdds(bet.pick_odds)+'</span>'+
    '<span class="bbm-edge">+'+edgeStr+'</span>'+
  '</div>';
}

function renderOV(){
  const matches = DATA.matches.filter(function(x){return x.event_id===AG;});
  if(!matches.length) return;
  const m = matches[0];
  const allBets = DATA.bets.filter(function(b){return b.event_id===AG;});
  const qualifying = allBets.filter(function(b){return isTrue(b.meets_threshold);}).sort(function(a,b){return (num(b.edge)||0)-(num(a.edge)||0);});

  let h='<div class="bb-match-wrap"><div class="bb-match-hdr">Best Bets '+String.fromCharCode(8212)+' Ranked by Edge</div>';
  if(qualifying.length){
    qualifying.forEach(function(b,i){ h+=bbmRow(i+1,b); });
  } else {
    h+='<div class="bbm-empty">No qualifying edge on this match right now.</div>';
  }
  h+='</div>';

  h+='<div class="pt-hdr">Box Score Projection</div>'+
  '<table class="pt">'+
    '<tr><th>Player</th><th>Games</th><th>Aces</th><th>DFs</th><th>1st In%</th><th>1st Won%</th><th>2nd Won%</th><th>BP Saved</th></tr>'+
    buildRow(m,'fav')+
    buildRow(m,'dog')+
  '</table>';

  document.getElementById('pane-ov').innerHTML=h;
}

function buildRow(m,side){
  const o = side==='fav' ? 'dog' : 'fav';
  const gw=num(m[side+'_proj_games_won']), gwO=num(m[o+'_proj_games_won']);
  const ac=num(m[side+'_proj_aces']), acO=num(m[o+'_proj_aces']);
  const df=num(m[side+'_proj_dfs']), dfO=num(m[o+'_proj_dfs']);
  const fi=num(m[side+'_proj_1stIn_pct']), fiO=num(m[o+'_proj_1stIn_pct']);
  const fw=num(m[side+'_proj_1stWon_pct']), fwO=num(m[o+'_proj_1stWon_pct']);
  const sw=num(m[side+'_proj_2ndWon_pct']), swO=num(m[o+'_proj_2ndWon_pct']);
  const bp=num(m[side+'_proj_bp_saved']), bpO=num(m[o+'_proj_bp_saved']);
  const rankVal=m[side+'_elo_rank'];
  const rankBadge = rankVal && num(rankVal)!==null ? ('<span class="rank-badge">#'+Math.round(num(rankVal))+'</span>') : '';

  return '<tr>'+
    '<td>'+m[side+'_name']+rankBadge+'</td>'+
    '<td><span class="sc mono '+relCls(gw,gwO,true)+'">'+fmt1(gw)+'</span></td>'+
    '<td><span class="sc mono '+relCls(ac,acO,true)+'">'+fmt1(ac)+'</span></td>'+
    '<td><span class="sc mono '+relCls(df,dfO,false)+'">'+fmt1(df)+'</span></td>'+
    '<td><span class="sc mono '+relCls(fi,fiO,true)+'">'+pct(fi)+'</span></td>'+
    '<td><span class="sc mono '+relCls(fw,fwO,true)+'">'+pct(fw)+'</span></td>'+
    '<td><span class="sc mono '+relCls(sw,swO,true)+'">'+pct(sw)+'</span></td>'+
    '<td><span class="sc mono '+relCls(bp,bpO,true)+'">'+fmt1(bp)+'</span></td>'+
  '</tr>';
}

const CHART_STATS=[
  {key:'chart_elo',               label:'Elo Rating',         fmt:function(v){return v!==null?Math.round(v):String.fromCharCode(8212);}, hib:true},
  {key:'chart_svc_games_won_pct', label:'Service Games Won%', fmt:pct, hib:true},
  {key:'chart_ret_games_won_pct', label:'Return Games Won%',  fmt:pct, hib:true},
  {key:'chart_aces_per_match',    label:'Aces / Match',       fmt:fmt1, hib:true},
  {key:'chart_dfs_per_match',     label:'Double Faults / Match', fmt:fmt1, hib:false},
  {key:'chart_1st_serve_won_pct', label:'1st Serve Won%',     fmt:pct, hib:true},
  {key:'chart_2nd_serve_won_pct', label:'2nd Serve Won%',     fmt:pct, hib:true},
  {key:'chart_bp_saved_pct',      label:'Break Points Saved%',fmt:pct, hib:true}
];

function renderMC(){
  const matches = DATA.matches.filter(function(x){return x.event_id===AG;});
  if(!matches.length) return;
  const m = matches[0];
  const favSample = num(m.fav_chart_sample_svpt)||0;
  const dogSample = num(m.dog_chart_sample_svpt)||0;

  let h='<div class="mc-wrap">'+
    '<div class="mc-hdr">12-Month Rolling Matchup Chart</div>'+
    '<table class="mc-table">'+
    '<tr><th class="lbl"></th><th>'+lastName(m.fav_name)+(favSample<150?' <span class="mc-samplewarn">LOW SAMPLE</span>':'')+'</th><th>'+lastName(m.dog_name)+(dogSample<150?' <span class="mc-samplewarn">LOW SAMPLE</span>':'')+'</th></tr>';

  CHART_STATS.forEach(function(stat){
    const fv = num(m['fav_'+stat.key]);
    const dv = num(m['dog_'+stat.key]);
    const fCls = relCls(fv,dv,stat.hib);
    const dCls = relCls(dv,fv,stat.hib);
    h+='<tr class="mc-row">'+
      '<td class="mc-label">'+stat.label+'</td>'+
      '<td class="mc-cell"><span class="mc-val mono '+fCls+'">'+stat.fmt(fv)+'</span></td>'+
      '<td class="mc-cell"><span class="mc-val mono '+dCls+'">'+stat.fmt(dv)+'</span></td>'+
    '</tr>';
  });

  h+='</table></div>';
  document.getElementById('pane-mc').innerHTML=h;
}
</script>
</body>
