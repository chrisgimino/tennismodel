<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RotoGrinders · Tennis Matchups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --rg:#0076FF; --rg-d:#0055CC; --rg-dim:#001f5c;
  --bg:#0c0c10; --bg2:#13131c; --bg3:#1c1c28; --bg4:#252535;
  --bd:#2a2a3e; --bd2:#38384e;
  --txt:#f0f0fa; --sub:#a0a0c0; --dim:#505070;
  --wh:#ffffff;
  --g:#22c55e; --gbg:#0a2218; --gbd:#166534;
  --a:#f59e0b; --abg:#231500; --abd:#92400e;
  --r:#ef4444; --rbg:#220a0a; --rbd:#991b1b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased}

.tour-filter{background:var(--bg2);border-bottom:1px solid var(--bd);padding:7px 12px;display:flex;gap:4px}
.tbtn{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:4px 12px;background:var(--bg3);color:var(--sub);border:1px solid var(--bd2);cursor:pointer;border-radius:2px;transition:.15s}
.tbtn.on{background:var(--rg);color:var(--wh);border-color:var(--rg)}

.game-strip{background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;padding:0 12px}
.game-strip::-webkit-scrollbar{height:2px}
.game-strip::-webkit-scrollbar-thumb{background:var(--rg-dim)}
.gpill{padding:9px 18px;cursor:pointer;border-right:1px solid var(--bd);border-bottom:3px solid transparent;transition:.15s;white-space:nowrap;min-width:150px;display:flex;flex-direction:column;gap:3px}
.gpill:hover{background:var(--bg3)}
.gpill.active{border-bottom-color:var(--rg);background:var(--bg3)}
.gp-teams{font-size:14px;font-weight:800;color:var(--wh);letter-spacing:.3px}
.gp-meta{font-size:10px;color:var(--sub);letter-spacing:.3px;display:flex;gap:6px;align-items:center}
.gp-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.gp-bestbet{font-size:9px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.4px}

.game-hdr{background:var(--bg2);border-bottom:2px solid var(--bd);padding:14px 16px;display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
.gh-player{display:flex;flex-direction:column;gap:4px}
.gh-player.r{text-align:right;align-items:flex-end}
.gh-rank{font-size:10px;color:var(--dim);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.gh-name{font-size:22px;font-weight:900;color:var(--wh);line-height:1.05;letter-spacing:-.3px}
.gh-lowsample{display:inline-block;font-size:8px;font-weight:800;background:var(--abg);color:var(--a);border:1px solid var(--abd);padding:1px 5px;border-radius:2px;letter-spacing:.4px;margin-top:2px}
.gh-ml{font-size:22px;font-weight:800;color:var(--wh);font-variant-numeric:tabular-nums}
.gh-ml.fav{color:var(--a)}
.gh-prob{font-size:11px;color:var(--sub);font-variant-numeric:tabular-nums}
.gh-mid{display:flex;flex-direction:column;align-items:center;gap:5px}
.gh-ou-box{background:var(--bg3);border:1px solid var(--rg-dim);padding:5px 16px;border-radius:3px;font-size:20px;font-weight:900;color:var(--wh);font-variant-numeric:tabular-nums;text-align:center}
.gh-ou-lbl{font-size:8px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;text-align:center;margin-top:2px}
.gh-surf{font-size:10px;color:var(--sub);text-align:center;display:flex;align-items:center;gap:4px}

.tab-bar{background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;padding:0 12px}
.tab{padding:9px 15px;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--sub);cursor:pointer;border-bottom:3px solid transparent;transition:.15s;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--txt)}
.tab.on{color:var(--rg);border-bottom-color:var(--rg)}
.pane{display:none}.pane.on{display:block}

.bb-wrap{padding:12px 14px;border-bottom:1px solid var(--bd)}
.bb-hdr{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:9px}
.bb-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.bb-card{background:var(--bg3);border:1px solid var(--bd2);border-radius:3px;padding:10px}
.bb-card.empty{display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:11px;font-style:italic}
.bb-mkt{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.bb-side{font-size:14px;font-weight:800;color:var(--wh);margin-bottom:4px;line-height:1.2}
.bb-row{display:flex;justify-content:space-between;align-items:center}
.bb-odds{font-size:13px;font-weight:700;color:var(--sub);font-variant-numeric:tabular-nums}
.bb-edge{font-size:9px;font-weight:800;color:#4ade80;background:var(--gbg);border:1px solid var(--gbd);padding:2px 6px;border-radius:2px}

.pt-hdr{padding:7px 12px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);background:var(--bg2);border-bottom:1px solid var(--bd);border-top:1px solid var(--bd)}
.pt{width:100%;border-collapse:collapse}
.pt th{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);padding:7px 5px;text-align:right;border-bottom:1px solid var(--bd2);background:var(--bg2);white-space:nowrap}
.pt th:first-child{text-align:left;padding-left:12px;min-width:140px}
.pt td{padding:0;border-bottom:1px solid var(--bg3);white-space:nowrap}
.pt td:first-child{padding:6px 8px 6px 12px;font-size:13px;font-weight:600;color:var(--wh);text-align:left}
.pt tr:hover td{filter:brightness(1.12)}
.pt tr:hover td:first-child{background:var(--bg3)}
.sc{display:block;padding:6px 5px;text-align:right;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
.hi{background:var(--gbg);color:#4ade80}
.md{background:var(--bg3);color:#d0d0e8}
.lo{background:var(--rbg);color:#f87171}
.nu{background:var(--bg);color:var(--dim);text-align:center}
.rank-badge{font-size:9px;color:var(--dim);font-weight:600;margin-left:5px}

.sr-wrap{padding:14px}
.sr-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sr-col{background:var(--bg2);border:1px solid var(--bd);border-radius:4px;padding:12px}
.sr-col h4{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);margin-bottom:10px;font-weight:700}
.sr-stat{margin-bottom:11px}
.sr-stat:last-child{margin-bottom:0}
.sr-label-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.sr-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.sr-vs{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.sr-val{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;padding:2px 8px;border-radius:2px}
.sr-novs{font-size:10px;color:var(--dim);font-style:italic}

.disc{padding:8px 14px;font-size:9px;color:var(--dim);border-top:1px solid var(--bd);letter-spacing:.3px;line-height:1.7}

#loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px}
#loading-overlay.hidden{display:none}
.ld-spinner{width:32px;height:32px;border:2px solid var(--bd2);border-top-color:var(--rg);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-text{font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
.ld-err{font-size:10px;color:var(--r);letter-spacing:1px;text-align:center;max-width:300px;line-height:1.6}

@media(max-width:560px){
  .bb-grid{grid-template-columns:1fr}
  .sr-grid{grid-template-columns:1fr}
  .gh-name{font-size:16px}
  .gh-ml{font-size:16px}
}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="ld-spinner"></div>
  <div class="ld-text" id="ld-msg">Loading slate data...</div>
  <div class="ld-err" id="ld-err" style="display:none"></div>
</div>

<div class="tour-filter" id="tourFilter">
  <button class="tbtn on" data-tour="ALL" onclick="setTour('ALL',this)">All</button>
  <button class="tbtn" data-tour="ATP" onclick="setTour('ATP',this)">ATP</button>
  <button class="tbtn" data-tour="WTA" onclick="setTour('WTA',this)">WTA</button>
</div>
<div class="game-strip" id="gameStrip"></div>
<div class="game-hdr" id="gameHdr"></div>

<div class="tab-bar">
  <button class="tab on" onclick="swTab(this,'ov')">Matchup &amp; Bets</button>
  <button class="tab" onclick="swTab(this,'sr')">Serve vs Return</button>
</div>

<div class="pane on" id="pane-ov"></div>
<div class="pane" id="pane-sr"></div>

<div class="disc">PROJECTIONS &amp; ODDS DATA SUBJECT TO CHANGE AND NOT UPDATED LIVE. WIN PROBABILITIES FROM ROTOGRINDERS' TENNIS SIMULATION MODEL. BEST BETS REFLECT MODEL EDGE VS. CONSENSUS MARKET, NOT GUARANTEED OUTCOMES.</div>

<script>
const CSV_URL = 'https://raw.githubusercontent.com/chrisgimino/tennismodel/refs/heads/main/slate_widget.csv';

function parseCSV(text){
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    const cols=[]; let cur=''; let inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur);cur='';}
      else{cur+=c;}
    }
    cols.push(cur);
    const row={};
    headers.forEach((h,i)=>{row[h]=(cols[i]||'').replace(/^"|"$/g,'').trim();});
    return row;
  });
}

function num(v){const n=parseFloat(v);return isNaN(n)?null:n;}
function fmtOdds(v){const n=num(v);if(n===null)return '—';return n>0?'+'+Math.round(n):''+Math.round(n);}
function pct(v){const n=num(v);return n===null?'—':Math.round(n*100)+'%';}
function fmt1(v){const n=num(v);return n===null?'—':n.toFixed(1);}
function isTrue(v){return v==='True'||v==='true'||v===true;}

function relCls(a,b,higherIsBetter){
  if(higherIsBetter===undefined) higherIsBetter=true;
  if(a===null||b===null)return 'nu';
  if(a===b)return 'md';
  const aWins = higherIsBetter ? a>b : a<b;
  return aWins?'hi':'lo';
}

let DATA={matches:[],bets:[]};
let AG=null, AT='ov', TOURFILTER='ALL';

async function boot(){
  try{
    const res=await fetch(CSV_URL+'?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status+' — check CSV URL');
    const text=await res.text();
    const rows=parseCSV(text);
    DATA.matches=rows.filter(r=>r.record_type==='MATCH');
    DATA.bets=rows.filter(r=>r.record_type==='BESTBET');
    if(!DATA.matches.length) throw new Error('No MATCH rows found in CSV');
    document.getElementById('loading-overlay').classList.add('hidden');
    init();
  }catch(e){
    document.querySelector('.ld-spinner').style.display='none';
    document.getElementById('ld-msg').style.display='none';
    document.getElementById('ld-err').style.display='block';
    document.getElementById('ld-err').textContent='Failed to load: '+e.message;
  }
}
boot();

function visibleMatches(){
  return TOURFILTER==='ALL' ? DATA.matches : DATA.matches.filter(m=>m.tour===TOURFILTER);
}

function init(){
  renderStrip();
  const vm=visibleMatches();
  if(vm.length) selGame(vm[0].event_id);
}

function setTour(t,btn){
  TOURFILTER=t;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderStrip();
  const vm=visibleMatches();
  if(vm.length) selGame(vm[0].event_id);
}

function renderStrip(){
  const strip=document.getElementById('gameStrip');
  const vm=visibleMatches();
  strip.innerHTML='';
  vm.forEach((m)=>{
    const d=document.createElement('div');
    d.className='gpill'+(m.event_id===AG?' active':'');
    d.id='gp-'+m.event_id;
    d.onclick=()=>selGame(m.event_id);
    const bets=DATA.bets.filter(b=>b.event_id===m.event_id);
    const bbCount=bets.length;
    const surfColor = m.surface==='Grass'?'#5fbf6f':m.surface==='Clay'?'#c46b3e':'#5b9bd5';
    d.innerHTML='<div class="gp-teams">'+m.fav_name.split(' ').pop()+' vs '+m.dog_name.split(' ').pop()+'</div>'+
      '<div class="gp-meta"><span class="gp-dot" style="background:'+surfColor+'"></span>'+m.surface+' · '+m.tour+
      (bbCount?(' <span class="gp-bestbet">· '+bbCount+' bet'+(bbCount>1?'s':'')+'</span>'):'')+'</div>';
    strip.appendChild(d);
  });
}

function selGame(id){
  AG=id;
  document.querySelectorAll('.gpill').forEach(p=>p.classList.toggle('active',p.id==='gp-'+id));
  renderHdr();
  render();
}

function swTab(btn,t){
  AT=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('pane-'+t).classList.add('on');
  render();
}

function render(){
  if(AT==='ov') renderOV();
  if(AT==='sr') renderSR();
}

function renderHdr(){
  const m=DATA.matches.find(x=>x.event_id===AG); if(!m)return;
  const favWp=Math.round(num(m.fav_sim_win_pct)*100);
  const dogWp=100-favWp;
  document.getElementById('gameHdr').innerHTML=
    '<div class="gh-player">'+
      '<div class="gh-rank">'+(m.fav_elo_rank&&num(m.fav_elo_rank)!==null?('Elo #'+Math.round(num(m.fav_elo_rank))):'Favorite')+'</div>'+
      '<div class="gh-name">'+m.fav_name.toUpperCase()+'</div>'+
      (isTrue(m.fav_low_sample)?'<span class="gh-lowsample">LOW SAMPLE</span>':'')+
      '<div class="gh-ml fav">'+fmtOdds(m.fav_ml_odds)+'</div>'+
      '<div class="gh-prob">'+favWp+'% win · '+(m.fav_ml_book||'')+'</div>'+
    '</div>'+
    '<div class="gh-mid">'+
      '<div class="gh-ou-box">'+(m.market_total_line||'—')+'</div>'+
      '<div class="gh-ou-lbl">Total Games</div>'+
      '<div class="gh-surf">'+m.surface+' · BO'+parseInt(m.best_of)+'</div>'+
    '</div>'+
    '<div class="gh-player r">'+
      '<div class="gh-rank">'+(m.dog_elo_rank&&num(m.dog_elo_rank)!==null?('Elo #'+Math.round(num(m.dog_elo_rank))):'Underdog')+'</div>'+
      '<div class="gh-name">'+m.dog_name.toUpperCase()+'</div>'+
      (isTrue(m.dog_low_sample)?'<span class="gh-lowsample">LOW SAMPLE</span>':'')+
      '<div class="gh-ml">'+fmtOdds(m.dog_ml_odds)+'</div>'+
      '<div class="gh-prob">'+dogWp+'% win · '+(m.dog_ml_book||'')+'</div>'+
    '</div>';
}

function bbCard(market,bet){
  if(!bet) return '<div class="bb-card empty">No edge</div>';
  const edgeVal=num(bet.edge)||0;
  const edgeStr = market==='Moneyline' ? (edgeVal*100).toFixed(1)+'pp' : edgeVal.toFixed(1)+' gm';
  return '<div class="bb-card">'+
    '<div class="bb-mkt">'+market+'</div>'+
    '<div class="bb-side">'+bet.side+'</div>'+
    '<div class="bb-row">'+
      '<span class="bb-odds">'+fmtOdds(bet.odds)+'</span>'+
      '<span class="bb-edge">+'+edgeStr+' edge</span>'+
    '</div>'+
  '</div>';
}

function renderOV(){
  const m=DATA.matches.find(x=>x.event_id===AG); if(!m)return;
  const bets=DATA.bets.filter(b=>b.event_id===AG);
  const mlBet=bets.find(b=>b.market==='Moneyline');
  const spBet=bets.find(b=>b.market==='Games Spread');
  const toBet=bets.find(b=>b.market==='Total Games');

  let h='<div class="bb-wrap">'+
    '<div class="bb-hdr">Best Bets</div>'+
    '<div class="bb-grid">'+
      bbCard('Moneyline',mlBet)+
      bbCard('Games Spread',spBet)+
      bbCard('Total Games',toBet)+
    '</div>'+
  '</div>';

  h+='<div class="pt-hdr">Box Score Projection</div>'+
  '<table class="pt">'+
    '<tr><th>Player</th><th>Games</th><th>Aces</th><th>DFs</th><th>1st In%</th><th>1st Won%</th><th>2nd Won%</th><th>BP Saved</th></tr>'+
    buildRow(m,'fav')+
    buildRow(m,'dog')+
  '</table>';

  document.getElementById('pane-ov').innerHTML=h;
}

function buildRow(m,side){
  const o = side==='fav' ? 'dog' : 'fav';
  const gw=num(m[side+'_proj_games_won']), gwO=num(m[o+'_proj_games_won']);
  const ac=num(m[side+'_proj_aces']), acO=num(m[o+'_proj_aces']);
  const df=num(m[side+'_proj_dfs']), dfO=num(m[o+'_proj_dfs']);
  const fi=num(m[side+'_proj_1stIn_pct']), fiO=num(m[o+'_proj_1stIn_pct']);
  const fw=num(m[side+'_proj_1stWon_pct']), fwO=num(m[o+'_proj_1stWon_pct']);
  const sw=num(m[side+'_proj_2ndWon_pct']), swO=num(m[o+'_proj_2ndWon_pct']);
  const bp=num(m[side+'_proj_bp_saved']), bpO=num(m[o+'_proj_bp_saved']);
  const rankVal=m[side+'_elo_rank'];
  const rankBadge = rankVal && num(rankVal)!==null ? ('<span class="rank-badge">#'+Math.round(num(rankVal))+'</span>') : '';

  return '<tr>'+
    '<td>'+m[side+'_name']+rankBadge+'</td>'+
    '<td><span class="sc '+relCls(gw,gwO,true)+'">'+fmt1(gw)+'</span></td>'+
    '<td><span class="sc '+relCls(ac,acO,true)+'">'+fmt1(ac)+'</span></td>'+
    '<td><span class="sc '+relCls(df,dfO,false)+'">'+fmt1(df)+'</span></td>'+
    '<td><span class="sc '+relCls(fi,fiO,true)+'">'+pct(fi)+'</span></td>'+
    '<td><span class="sc '+relCls(fw,fwO,true)+'">'+pct(fw)+'</span></td>'+
    '<td><span class="sc '+relCls(sw,swO,true)+'">'+pct(sw)+'</span></td>'+
    '<td><span class="sc '+relCls(bp,bpO,true)+'">'+fmt1(bp)+'</span></td>'+
  '</tr>';
}

function srStat(label, favVal, dogVal, favName, dogName, higherIsBetter){
  if(higherIsBetter===undefined) higherIsBetter=true;
  const fv=num(favVal), dv=num(dogVal);
  if(fv===null && dv===null){
    return '<div class="sr-stat"><div class="sr-label-row"><span class="sr-label">'+label+'</span><span class="sr-novs">no data</span></div></div>';
  }
  const favCls = relCls(fv,dv,higherIsBetter);
  const dogCls = relCls(dv,fv,higherIsBetter);
  return '<div class="sr-stat">'+
    '<div class="sr-label-row"><span class="sr-label">'+label+'</span></div>'+
    '<div class="sr-vs">'+
      '<span class="sr-val '+favCls+'">'+(fv!==null?Math.round(fv*100)+'%':'—')+'</span>'+
      '<span style="color:var(--dim);font-size:10px">'+favName.split(' ').pop()+'</span>'+
      '<span style="color:var(--dim);margin:0 4px">vs</span>'+
      '<span class="sr-val '+dogCls+'">'+(dv!==null?Math.round(dv*100)+'%':'—')+'</span>'+
      '<span style="color:var(--dim);font-size:10px">'+dogName.split(' ').pop()+'</span>'+
    '</div>'+
  '</div>';
}

function renderSR(){
  const m=DATA.matches.find(x=>x.event_id===AG); if(!m)return;
  let h='<div class="sr-wrap"><div class="sr-grid">'+
    '<div class="sr-col">'+
      '<h4>'+m.fav_name+' Serve vs '+m.dog_name+' Return</h4>'+
      srStat('1st Serve In', m.fav_proj_1stIn_pct, null, m.fav_name, m.dog_name)+
      srStat('1st Serve Won', m.fav_proj_1stWon_pct, m.dog_proj_ret_won_pct, m.fav_name, m.dog_name)+
      srStat('2nd Serve Won', m.fav_proj_2ndWon_pct, null, m.fav_name, m.dog_name)+
    '</div>'+
    '<div class="sr-col">'+
      '<h4>'+m.dog_name+' Serve vs '+m.fav_name+' Return</h4>'+
      srStat('1st Serve In', m.dog_proj_1stIn_pct, null, m.dog_name, m.fav_name)+
      srStat('1st Serve Won', m.dog_proj_1stWon_pct, m.fav_proj_ret_won_pct, m.dog_name, m.fav_name)+
      srStat('2nd Serve Won', m.dog_proj_2ndWon_pct, null, m.dog_name, m.fav_name)+
    '</div>'+
  '</div></div>';
  document.getElementById('pane-sr').innerHTML=h;
}
</script>
</body>
</html>
